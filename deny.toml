# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny crates with known security vulnerabilities.
# Use `ignore = ["RUSTSEC-YYYY-NNNN"]` to temporarily suppress specific advisories.
ignore = [
]

[licenses]
# Allow these licenses for all dependencies.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
# Warn on multiple versions of the same crate (helps catch bloat).
multiple-versions = "warn"
wildcards = "allow"
# Known transitive duplicates we cannot control from our direct deps.
# Revisit these whenever upstream crates upgrade.
skip = [
    # `ring` (via rustls/rcgen) still pulls the older windows-sys 0.52 line.
    { name = "windows-sys", version = "=0.52.0" },
    { name = "windows-targets", version = "=0.52.6" },
    { name = "windows_aarch64_gnullvm", version = "=0.52.6" },
    { name = "windows_aarch64_msvc", version = "=0.52.6" },
    { name = "windows_i686_gnu", version = "=0.52.6" },
    { name = "windows_i686_gnullvm", version = "=0.52.6" },
    { name = "windows_i686_msvc", version = "=0.52.6" },
    { name = "windows_x86_64_gnu", version = "=0.52.6" },
    { name = "windows_x86_64_gnullvm", version = "=0.52.6" },
    { name = "windows_x86_64_msvc", version = "=0.52.6" },
    # `clap`'s anstyle-query/anstyle-wincon track windows-sys 0.60 while tokio
    # tracks 0.61 — both are current, just out of phase.
    { name = "windows-sys", version = "=0.60.2" },
    # `crypto-common` (sha2/digest) and `ring` still depend on the
    # rand_core 0.6 / getrandom 0.2 line.
    { name = "rand_core", version = "=0.6.4" },
    { name = "getrandom", version = "=0.2.17" },
]

[sources]
# Only allow crates from crates.io or specific git repos.
unknown-registry = "deny"
unknown-git = "allow"
allow-git = [
    "https://github.com/nicktrav/ms-tpm-20-ref",
]
